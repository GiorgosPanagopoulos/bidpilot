<svg width="760" height="220" viewBox="0 0 760 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e7c873"/>
      <stop offset="1" stop-color="#c9a84c"/>
    </linearGradient>
  </defs>
  <rect width="760" height="220" rx="28" fill="#0f1117"/>

  <!-- icon box -->
  <rect x="48" y="50" width="120" height="120" rx="26" fill="#161a22" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- ascending trajectory -->
  <circle cx="76" cy="144" r="4" fill="#c9a84c" fill-opacity="0.4"/>
  <circle cx="92" cy="128" r="4" fill="#c9a84c" fill-opacity="0.6"/>

  <!-- paper-plane / send mark, ascending up-right -->
