    <path d="M-34 14 L40 0 L-34 -14 L-22 0 Z" fill="url(#gold)"/>
    <path d="M-22 0 L40 0" stroke="#0f1117" stroke-width="2" stroke-opacity="0.25"/>
  </g>

  <!-- wordmark -->
  <text x="206" y="118" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="58" font-weight="700" letter-spacing="-1">
    <tspan fill="#f5f6f8">Bid</tspan><tspan fill="url(#gold)">Pilot</tspan>
  </text>
  <text x="208" y="150" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="500" letter-spacing="6" fill="#8b93a7">TENDER INTELLIGENCE</text>
</svg>
